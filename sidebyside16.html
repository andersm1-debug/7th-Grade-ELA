<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side-by-Side Vocabulary Quiz</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-w-5xl">
        <a href="index.html" class="text-slate-500 hover:text-blue-600 font-bold text-lg mb-4 inline-block transition-colors">
            ← HUB_CENTRAL
        </a>
    </div>

    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizData = [
            { word: "Polygamy", hint: "Poly = Many", definition: "Having more than one spouse at a time.", sentence: "In some ancient historical cultures, ______ was practiced, allowing a leader to have multiple spouses.", options: ["Polygamy", "Polytheism", "Superb", "Trident"] },
            { word: "Polytheism", hint: "Poly = Many", definition: "The belief in many Gods.", sentence: "Ancient Greek and Roman religions are examples of ______, as they worshipped a large pantheon of deities.", options: ["Trilogy", "Polytheism", "Polynomial", "Revert"] },
            { word: "Polynomial", hint: "Poly = Many", definition: "An expression of two or more algebraic terms.", sentence: "In math class, the students learned how to simplify a ______ with several different variables.", options: ["Triangle", "Polychromatic", "Polynomial", "Supernatural"] },
            { word: "Polychromatic", hint: "Poly = Many", definition: "Consisting of two or more colors.", sentence: "The artist's beautiful, ______ painting brightened up the entire room.", options: ["Polygamy", "Polychromatic", "Superb", "Trilingual"] },
            { word: "Refrain", hint: "Re = Back / Again", definition: "To stop or not do again.", sentence: "The teacher asked the class to ______ from talking while the guest speaker was presenting.", options: ["Rejuvenate", "Refrain", "Revert", "Superimposed"] },
            { word: "Rejuvenate", hint: "Re = Back / Again", definition: "To feel young and strong again.", sentence: "A long nap on a Sunday afternoon can completely ______ your energy for the week.", options: ["Revert", "Rejuvenate", "Superb", "Trilogy"] },
            { word: "Revert", hint: "Re = Back / Again", definition: "To go back to a previous state.", sentence: "If you mess up your document, you can hit undo to ______ to the saved version.", options: ["Refrain", "Trident", "Revert", "Superintendent"] },
            { word: "Superb", hint: "Super = Above", definition: "Excellent.", sentence: "The band put on a ______ performance, earning a standing ovation from the crowd.", options: ["Superb", "Polychromatic", "Trilingual", "Superimposed"] },
            { word: "Superintendent", hint: "Super = Above", definition: "A person who oversees and manages an organization.", sentence: "If school is going to be canceled for a snow day, the district ______ has to make the final call.", options: ["Trident", "Polytheism", "Polynomial", "Superintendent"] },
            { word: "Supernatural", hint: "Super = Above", definition: "Not existing in nature.", sentence: "Ghosts, werewolves, and vampires are considered ______ creatures.", options: ["Supernatural", "Rejuvenate", "Trilogy", "Polygamy"] },
            { word: "Superimposed", hint: "Super = Above", definition: "Two or more things stacked on top of each other to appear as one.", sentence: "The photographer edited the image so that a picture of the moon was ______ over the city skyline.", options: ["Superimposed", "Refrain", "Revert", "Polychromatic"] },
            { word: "Triangle", hint: "Tri = Three", definition: "Geometric figure with three angles.", sentence: "To find the area of a ______, you multiply the base by the height and divide by two.", options: ["Trident", "Triangle", "Polynomial", "Supernatural"] },
            { word: "Trilingual", hint: "Tri = Three", definition: "Knowing three languages.", sentence: "Because she speaks English, Spanish, and French fluently, she is ______.", options: ["Polychromatic", "Trilingual", "Superb", "Polytheism"] },
            { word: "Trident", hint: "Tri = Three", definition: "A spear with three prongs.", sentence: "In mythology, Poseidon, the god of the sea, is always depicted holding a golden ______.", options: ["Trilogy", "Triangle", "Trident", "Superintendent"] },
            { word: "Trilogy", hint: "Tri = Three", definition: "A set of three literary works.", sentence: "The Lord of the Rings is an epic fantasy ______ that tells one massive story across three books.", options: ["Polygamy", "Rejuvenate", "Trilogy", "Superimposed"] }
        ];

        function Quiz() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [quizComplete, setQuizComplete] = useState(false);
            const [feedback, setFeedback] = useState(null); // 'correct' or 'incorrect'

            const handleAnswer = (selectedOption) => {
                const isCorrect = selectedOption === quizData[currentQuestion].word;
                
                if (isCorrect) {
                    setFeedback('correct');
                    setScore(score + 1);
                } else {
                    setFeedback('incorrect');
                }

                setTimeout(() => {
                    setFeedback(null);
                    setShowHint(false);
                    if (currentQuestion + 1 < quizData.length) {
                        setCurrentQuestion(currentQuestion + 1);
                    } else {
                        setQuizComplete(true);
                    }
                }, 1000);
            };

            const resetQuiz = () => {
                setCurrentQuestion(0);
                setScore(0);
                setShowHint(false);
                setQuizComplete(false);
                setFeedback(null);
            };

            if (quizComplete) {
                return (
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-md mx-auto mt-8">
                        <h2 className="text-3xl font-bold mb-4 text-slate-800">Quiz Complete!</h2>
                        <p className="text-xl mb-6">You scored <span className="font-bold text-blue-600">{score}</span> out of {quizData.length}</p>
                        <button 
                            onClick={resetQuiz}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
                        >
                            Try Again
                        </button>
                    </div>
                );
            }

            const q = quizData[currentQuestion];
            const progress = ((currentQuestion) / quizData.length) * 100;

            return (
                <div className="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col w-full h-[600px]">
                    <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                        <div className="font-semibold text-lg flex-1">Score: {score} / {quizData.length}</div>
                        <div className="flex-1 max-w-md bg-slate-600 rounded-full h-3 mx-4">
                            <div className="bg-blue-400 h-3 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="font-semibold text-lg flex-1 text-right">Question {currentQuestion + 1} of {quizData.length}</div>
                    </div>

                    <div className="flex-1 flex flex-col md:flex-row">
                        <div className="md:w-1/2 p-8 border-b md:border-b-0 md:border-r border-slate-200 flex flex-col justify-center bg-slate-50">
                            <div className="mb-6">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Definition</span>
                                <p className="text-xl font-medium text-slate-800 mt-1 italic">"{q.definition}"</p>
                            </div>
                            
                            <div className="mb-8">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Sentence</span>
                                <p className="text-2xl font-bold text-blue-900 mt-2 leading-snug">{q.sentence}</p>
                            </div>

                            <div>
                                {!showHint ? (
                                    <button 
                                        onClick={() => setShowHint(true)}
                                        className="text-sm bg-amber-100 text-amber-800 px-4 py-2 rounded-full font-semibold hover:bg-amber-200 transition"
                                    >
                                        💡 Need a Hint?
                                    </button>
                                ) : (
                                    <div className="inline-block bg-amber-200 text-amber-900 px-4 py-2 rounded-full font-bold animate-pulse">
                                        Prefix Hint: {q.hint}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="md:w-1/2 p-8 flex flex-col justify-center gap-4 bg-white">
                            <h3 className="text-lg font-semibold text-slate-700 mb-2 text-center">Select the correct word:</h3>
                            {q.options.map((option, index) => {
                                let btnClass = "w-full text-left text-lg p-5 rounded-lg border-2 font-medium transition duration-200 shadow-sm ";
                                
                                if (feedback && option === q.word) {
                                    btnClass += "bg-green-100 border-green-500 text-green-800";
                                } else if (feedback === 'incorrect' && option !== q.word) {
                                    btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                                } else {
                                    btnClass += "bg-white border-slate-300 text-slate-700 hover:border-blue-500 hover:bg-blue-50";
                                }

                                return (
                                    <button 
                                        key={index}
                                        disabled={feedback !== null}
                                        onClick={() => handleAnswer(option)}
                                        className={btnClass}
                                    >
                                        {option}
                                    </button>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Quiz />, document.getElementById('root'));
    </script>
</body>
</html>
