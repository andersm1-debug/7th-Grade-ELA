<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNTAX SURGERY: ADVANCED DGP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0d1117;
            background-image: linear-gradient(rgba(88, 166, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(88, 166, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #c9d1d9;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #lab-container {
            background: rgba(22, 27, 34, 0.95);
            border: 2px solid #30363d;
            border-top: 6px solid #58a6ff;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .hub-link {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .lab-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin: 25px 0 10px 0;
            color: #58a6ff;
            letter-spacing: 2px;
        }

        #input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #sentence-input {
            flex-grow: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            border-radius: 4px;
        }

        #analyze-btn {
            background: #58a6ff;
            color: #0d1117;
            border: none;
            padding: 0 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        #workspace {
            background: #0d1117;
            border: 1px dashed #30363d;
            padding: 40px 20px;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .word-token {
            position: relative;
            background: transparent;
            border: 2px solid transparent;
            color: #c9d1d9;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .word-token.selected {
            border-color: #f2e05a;
            background: rgba(242, 224, 90, 0.1);
        }

        .tag-label {
            font-size: 0.75rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            height: 15px;
            margin-bottom: 5px;
        }

        /* The Tagging Dashboard */
        #tag-dashboard {
            display: none;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 20px;
        }

        .dash-header {
            color: #f2e05a;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .category-group {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 4px;
        }

        .category-title {
            font-size: 0.8rem;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tag-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 5px 8px;
            margin: 2px;
            font-size: 0.75rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 3px;
            transition: 0.2s;
        }

        .tag-btn:hover { filter: brightness(1.5); }
        .clear-btn { width: 100%; margin-top: 15px; background: #f85149; color: #fff; text-align:center; padding: 10px; cursor: pointer; border: none; font-weight: bold;}

    </style>
</head>
<body>

<div id="lab-container">
    <a href="index.html" class="hub-link">← Hub Network</a>
    <h1 class="lab-title">SYNTAX SURGERY</h1>
    
    <div id="input-section">
        <input type="text" id="sentence-input" placeholder="Initialize sentence data..." autocomplete="off">
        <button id="analyze-btn" onclick="processSentence()">LOAD</button>
    </div>

    <div id="workspace">
        <p style="color: #484f58; font-style: italic;">Awaiting structural input...</p>
    </div>

    <div id="tag-dashboard">
        <h3 class="dash-header" id="selected-word-display">SELECT A WORD TO TAG</h3>
        <div class="category-grid" id="tag-grid">
            </div>
        <button class="clear-btn" onclick="applyTag('', '#c9d1d9')">CLEAR TAG</button>
    </div>
</div>

<script>
    // Advanced Tag Database based on 9 Steps
    const grammarData = [
        { cat: "1. Nouns", color: "#58a6ff", tags: [
            { id: "n", name: "Common" }, { id: "N", name: "Proper" }, { id: "pos n", name: "Possessive Common" }, { id: "pos N", name: "Possessive Proper" }
        ]},
        { cat: "2. Pronouns", color: "#ff7b72", tags: [
            { id: "nom pro", name: "Nominative" }, { id: "obj pro", name: "Objective" }, { id: "pos pro", name: "Possessive" },
            { id: "ref pro", name: "Reflexive" }, { id: "rp", name: "Relative" }, { id: "int pro", name: "Interrogative" },
            { id: "dem pro", name: "Demonstrative" }, { id: "ind pro", name: "Indefinite" }
        ]},
        { cat: "3. Adjectives", color: "#d2a8ff", tags: [
            { id: "adj", name: "Adjective" }, { id: "art", name: "Article" }, { id: "Adj", name: "Proper Adjective" }
        ]},
        { cat: "4. Verbs", color: "#3fb950", tags: [
            { id: "av", name: "Action Verb" }, { id: "lv", name: "Linking Verb" }, { id: "hv", name: "Helping Verb" }
        ]},
        { cat: "5. Verbals", color: "#238636", tags: [
            { id: "ger", name: "Gerund" }, { id: "part", name: "Participle" }, { id: "inf", name: "Infinitive" }
        ]},
        { cat: "6. Adverbs", color: "#f0883e", tags: [
            { id: "adv", name: "Adverb" }
        ]},
        { cat: "7. Prepositions", color: "#e3b341", tags: [
            { id: "prep", name: "Preposition" }
        ]},
        { cat: "8. Conjunctions", color: "#a5d6ff", tags: [
            { id: "cc", name: "Coordinating" }, { id: "cor conj", name: "Correlative" }, { id: "sc", name: "Subordinating" }
        ]},
        { cat: "9. Interjections", color: "#f85149", tags: [
            { id: "int", name: "Interjection" }
        ]}
    ];

    let selectedToken = null;

    // Build the Dashboard
    const tagGrid = document.getElementById('tag-grid');
    grammarData.forEach(group => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';
        
        const title = document.createElement('div');
        title.className = 'category-title';
        title.innerText = group.cat;
        groupDiv.appendChild(title);

        group.tags.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.innerText = t.id;
            btn.title = t.name;
            btn.onclick = () => applyTag(t.id, group.color);
            groupDiv.appendChild(btn);
        });
        tagGrid.appendChild(groupDiv);
    });

    function processSentence() {
        const inputStr = document.getElementById('sentence-input').value.trim();
        const workspace = document.getElementById('workspace');
        
        if (!inputStr) return;
        
        workspace.innerHTML = ''; 
        document.getElementById('tag-dashboard').style.display = 'block'; // Reveal dashboard
        
        const words = inputStr.split(/\s+/);

        words.forEach((word, index) => {
            const tokenBtn = document.createElement('button');
            tokenBtn.className = 'word-token';
            tokenBtn.id = 'token-' + index;

            const tagLabel = document.createElement('div');
            tagLabel.className = 'tag-label';
            
            const wordText = document.createElement('div');
            wordText.innerText = word;
            wordText.className = 'word-text';

            tokenBtn.appendChild(tagLabel);
            tokenBtn.appendChild(wordText);

            tokenBtn.onclick = () => selectToken(tokenBtn, word);
            workspace.appendChild(tokenBtn);
        });
    }

    function selectToken(tokenElement, wordString) {
        // Remove highlight from previous
        if(selectedToken) selectedToken.classList.remove('selected');
        
        selectedToken = tokenElement;
        selectedToken.classList.add('selected');
        
        document.getElementById('selected-word-display').innerText = "TARGET: " + wordString.toUpperCase();
    }

    function applyTag(tagId, colorCode) {
        if(!selectedToken) return;

        const label = selectedToken.querySelector('.tag-label');
        const text = selectedToken.querySelector('.word-text');

        label.innerText = tagId;
        label.style.color = colorCode;
        text.style.color = tagId === '' ? '#c9d1d9' : colorCode;
        
        // Auto-deselect after tagging for speed
        selectedToken.classList.remove('selected');
        selectedToken = null;
        document.getElementById('selected-word-display').innerText = "SELECT NEXT WORD";
    }

    document.getElementById("sentence-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            processSentence();
        }
    });
</script>
</body>
</html>
