<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 18 Vocabulary Quiz</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-w-5xl">
        <a href="index.html" class="text-slate-500 hover:text-blue-600 font-bold text-lg mb-4 inline-block transition-colors">
            ← HUB_CENTRAL
        </a>
    </div>

    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizData = [
            { word: "Precaution", hint: "Pre = Before", definition: "A measure taken beforehand to prevent harm.", sentence: "As a ______ before the storm hit, we tied down the Sunfish sailboat so it wouldn't blow away.", options: ["Subdermal", "Precaution", "Unite", "Predicament"] },
            { word: "Predecessor", hint: "Pre = Before", definition: "Someone who comes before someone else in a job or family.", sentence: "The new principal at Chicod School had big shoes to fill, as her ______ was beloved by all the students.", options: ["Transparent", "Reunion", "Predecessor", "Subsidiary"] },
            { word: "Precursor", hint: "Pre = Before", definition: "An event that leads to and is responsible for a second event.", sentence: "Dark clouds and a sudden drop in temperature are often a ______ to a heavy thunderstorm.", options: ["Precursor", "Transmit", "Unilateral", "Subordinate"] },
            { word: "Predicament", hint: "Pre = Before", definition: "A difficult situation to get out of.", sentence: "When Jamie got her leash tangled around the tree, the dog found herself in quite a ______.", options: ["Transcontinental", "Unique", "Precaution", "Predicament"] },
            { word: "Unilateral", hint: "Uni = One", definition: "Entirely one sided.", sentence: "The coach made a ______ decision to cancel practice without asking the rest of the team.", options: ["Subterranean", "Unilateral", "Transparent", "Predecessor"] },
            { word: "Unite", hint: "Uni = One", definition: "Act together in a common belief or idea.", sentence: "The Dirt Devils had to ______ as a team to win the high school championship.", options: ["Unite", "Reunion", "Transmit", "Subordinate"] },
            { word: "Reunion", hint: "Re = Back / Again", definition: "To come back together once more.", sentence: "Over the summer, our whole family traveled out of state for a massive family ______.", options: ["Subsidiary", "Precaution", "Reunion", "Precursor"] },
            { word: "Unique", hint: "Uni = One", definition: "Rarely distinct.", sentence: "The magic system in that new fantasy novel is entirely ______; I've never read anything like it!", options: ["Predicament", "Unilateral", "Transcontinental", "Unique"] },
            { word: "Subterranean", hint: "Sub = Under", definition: "Under the Earth.", sentence: "The explorers found a massive ______ cave system hidden deep beneath the mountains.", options: ["Subterranean", "Subdermal", "Transparent", "Predecessor"] },
            { word: "Subordinate", hint: "Sub = Under", definition: "A position lower in rank.", sentence: "In the military, a captain is considered a ______ to a general and must follow their orders.", options: ["Precursor", "Subordinate", "Unite", "Reunion"] },
            { word: "Subsidiary", hint: "Sub = Under", definition: "Both secondary and of lesser importance than a major role, but is also helpful in that role.", sentence: "The smaller tech company operated as a ______ to the massive global corporation.", options: ["Precaution", "Unilateral", "Subterranean", "Subsidiary"] },
            { word: "Subdermal", hint: "Sub = Under", definition: "Under the skin.", sentence: "The veterinarian placed a tiny ______ microchip under Sara's coat so she could be identified if she ever got lost.", options: ["Transparent", "Subdermal", "Transcontinental", "Unique"] },
            { word: "Transmit", hint: "Trans = Across", definition: "To send across.", sentence: "The radio tower was built to ______ signals across the entire county.", options: ["Transmit", "Unite", "Predicament", "Subordinate"] },
            { word: "Transparent", hint: "Trans = Across", definition: "To see through.", sentence: "The glass on the new smart-home thermostat was completely ______, letting you see the wall behind it.", options: ["Subdermal", "Subsidiary", "Transparent", "Precursor"] },
            { word: "Transcontinental", hint: "Trans = Across", definition: "To go across a land mass.", sentence: "The first ______ railroad allowed people to travel by train from the East Coast all the way to California.", options: ["Subterranean", "Reunion", "Predecessor", "Transcontinental"] }
        ];

        function Quiz() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [quizComplete, setQuizComplete] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const handleAnswer = (selectedOption) => {
                const isCorrect = selectedOption === quizData[currentQuestion].word;
                
                if (isCorrect) {
                    setFeedback('correct');
                    setScore(score + 1);
                } else {
                    setFeedback('incorrect');
                }

                setTimeout(() => {
                    setFeedback(null);
                    setShowHint(false);
                    if (currentQuestion + 1 < quizData.length) {
                        setCurrentQuestion(currentQuestion + 1);
                    } else {
                        setQuizComplete(true);
                    }
                }, 1000);
            };

            const resetQuiz = () => {
                setCurrentQuestion(0);
                setScore(0);
                setShowHint(false);
                setQuizComplete(false);
                setFeedback(null);
            };

            if (quizComplete) {
                return (
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-md mx-auto mt-8">
                        <h2 className="text-3xl font-bold mb-4 text-slate-800">Quiz Complete!</h2>
                        <p className="text-xl mb-6">You scored <span className="font-bold text-blue-600">{score}</span> out of {quizData.length}</p>
                        <button 
                            onClick={resetQuiz}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
                        >
                            Try Again
                        </button>
                    </div>
                );
            }

            const q = quizData[currentQuestion];
            const progress = ((currentQuestion) / quizData.length) * 100;

            return (
                <div className="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col w-full h-[600px]">
                    <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                        <div className="font-semibold text-lg flex-1">Score: {score} / {quizData.length}</div>
                        <div className="flex-1 max-w-md bg-slate-600 rounded-full h-3 mx-4">
                            <div className="bg-blue-400 h-3 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="font-semibold text-lg flex-1 text-right">Question {currentQuestion + 1} of {quizData.length}</div>
                    </div>

                    <div className="flex-1 flex flex-col md:flex-row">
                        <div className="md:w-1/2 p-8 border-b md:border-b-0 md:border-r border-slate-200 flex flex-col justify-center bg-slate-50">
                            <div className="mb-6">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Definition</span>
                                <p className="text-xl font-medium text-slate-800 mt-1 italic">"{q.definition}"</p>
                            </div>
                            
                            <div className="mb-8">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Sentence</span>
                                <p className="text-2xl font-bold text-blue-900 mt-2 leading-snug">{q.sentence}</p>
                            </div>

                            <div>
                                {!showHint ? (
                                    <button 
                                        onClick={() => setShowHint(true)}
                                        className="text-sm bg-amber-100 text-amber-800 px-4 py-2 rounded-full font-semibold hover:bg-amber-200 transition"
                                    >
                                        💡 Need a Hint?
                                    </button>
                                ) : (
                                    <div className="inline-block bg-amber-200 text-amber-900 px-4 py-2 rounded-full font-bold animate-pulse">
                                        Prefix Hint: {q.hint}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="md:w-1/2 p-8 flex flex-col justify-center gap-4 bg-white">
                            <h3 className="text-lg font-semibold text-slate-700 mb-2 text-center">Select the correct word:</h3>
                            {q.options.map((option, index) => {
                                let btnClass = "w-full text-left text-lg p-5 rounded-lg border-2 font-medium transition duration-200 shadow-sm ";
                                
                                if (feedback && option === q.word) {
                                    btnClass += "bg-green-100 border-green-500 text-green-800";
                                } else if (feedback === 'incorrect' && option !== q.word) {
                                    btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                                } else {
                                    btnClass += "bg-white border-slate-300 text-slate-700 hover:border-blue-500 hover:bg-blue-50";
                                }

                                return (
                                    <button 
                                        key={index}
                                        disabled={feedback !== null}
                                        onClick={() => handleAnswer(option)}
                                        className={btnClass}
                                    >
                                        {option}
                                    </button>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Quiz />, document.getElementById('root'));
    </script>
</body>
</html>
