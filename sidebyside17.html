<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 17 Vocabulary Quiz</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-w-5xl">
        <a href="index.html" class="text-slate-500 hover:text-blue-600 font-bold text-lg mb-4 inline-block transition-colors">
            ← HUB_CENTRAL
        </a>
    </div>

    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState } = React;

        const quizData = [
            { word: "Syntax", hint: "Syn = Same time", definition: "The grammatical arrangement of words in a sentence.", sentence: "If you mess up the ______ of your code or essay, it won't make sense to the reader.", options: ["Posterior", "Syntax", "Synthetic", "Synonym"] },
            { word: "Syndicate", hint: "Syn = Same time", definition: "A group of individuals or organizations combined to promote some common interest.", sentence: "A ______ of local business owners worked together to fund the new community park.", options: ["Semifinal", "Unemployment", "Syndicate", "Posterity"] },
            { word: "Synonym", hint: "Syn = Same time", definition: "Words that mean the same.", sentence: "When editing your writing, try using a ______ instead of repeating the word 'good' over and over.", options: ["Postmortem", "Syntax", "Unaware", "Synonym"] },
            { word: "Synthetic", hint: "Syn = Same time", definition: "Formed together from artificial part; not genuine.", sentence: "Most modern athletic shirts are made from ______ materials like polyester rather than natural cotton.", options: ["Semi-translucent", "Synthetic", "Unreliable", "Posterior"] },
            { word: "Posterity", hint: "Post = After", definition: "Descendants who come after you.", sentence: "We buried a time capsule in the courtyard so that ______ can see what life was like at our school.", options: ["Syndicate", "Postnatal", "Unemployment", "Posterity"] },
            { word: "Postnatal", hint: "Post = After", definition: "After birth.", sentence: "The hospital provides excellent ______ care to make sure both the mother and the newborn baby are healthy.", options: ["Postnatal", "Semifinal", "Postmortem", "Unaware"] },
            { word: "Postmortem", hint: "Post = After", definition: "After death.", sentence: "The veterinarian performed a ______ examination to determine why the zoo animal had suddenly passed away.", options: ["Synthetic", "Posterior", "Postnatal", "Postmortem"] },
            { word: "Posterior", hint: "Post = After", definition: "Near the back of something.", sentence: "The dorsal fin is located on the top of the shark, while the caudal fin is at the ______ end.", options: ["Syntax", "Posterior", "Unreliable", "Semi-parasitic"] },
            { word: "Semiterrestrial", hint: "Semi = Partly", definition: "Not growing or living entirely on land.", sentence: "Frogs are considered ______, meaning they spend part of their lives in the water and part on land.", options: ["Synthetic", "Postnatal", "Semiterrestrial", "Semi-translucent"] },
            { word: "Semi-translucent", hint: "Semi = Partly", definition: "Allowing light to partially pass through.", sentence: "The bathroom window was made of ______ glass, letting light in but keeping anyone from seeing clearly inside.", options: ["Synonym", "Semiterrestrial", "Semi-translucent", "Unaware"] },
            { word: "Semi-parasitic", hint: "Semi = Partly", definition: "Obtaining some food from a host but undergoing photosynthesis at the same time.", sentence: "Mistletoe is a ______ plant; it makes some of its own food but also steals water from the tree it grows on.", options: ["Unreliable", "Semi-parasitic", "Synthetic", "Posterior"] },
            { word: "Semifinal", hint: "Semi = Partly", definition: "A match, competition, or examination that precedes the final one.", sentence: "The Lady Hornets played incredibly well in the ______, securing their spot in the championship game.", options: ["Postmortem", "Unemployment", "Syndicate", "Semifinal"] },
            { word: "Unaware", hint: "Un = Not", definition: "To not know something.", sentence: "Because he was wearing noise-canceling headphones, he was completely ______ that the fire alarm was ringing.", options: ["Semiterrestrial", "Posterior", "Unaware", "Unreliable"] },
            { word: "Unreliable", hint: "Un = Not", definition: "Can not be trusted.", sentence: "My old car is so ______ that I never know if it's going to start in the morning.", options: ["Synthetic", "Unreliable", "Postnatal", "Semi-translucent"] },
            { word: "Unemployment", hint: "Un = Not", definition: "The number of people that do not have jobs.", sentence: "When the town's main factory closed down, the ______ rate skyrocketed.", options: ["Posterity", "Syntax", "Syndicate", "Unemployment"] }
        ];

        function Quiz() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showHint, setShowHint] = useState(false);
            const [quizComplete, setQuizComplete] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const handleAnswer = (selectedOption) => {
                const isCorrect = selectedOption === quizData[currentQuestion].word;
                
                if (isCorrect) {
                    setFeedback('correct');
                    setScore(score + 1);
                } else {
                    setFeedback('incorrect');
                }

                setTimeout(() => {
                    setFeedback(null);
                    setShowHint(false);
                    if (currentQuestion + 1 < quizData.length) {
                        setCurrentQuestion(currentQuestion + 1);
                    } else {
                        setQuizComplete(true);
                    }
                }, 1000);
            };

            const resetQuiz = () => {
                setCurrentQuestion(0);
                setScore(0);
                setShowHint(false);
                setQuizComplete(false);
                setFeedback(null);
            };

            if (quizComplete) {
                return (
                    <div className="bg-white p-8 rounded-xl shadow-lg text-center max-w-md mx-auto mt-8">
                        <h2 className="text-3xl font-bold mb-4 text-slate-800">Quiz Complete!</h2>
                        <p className="text-xl mb-6">You scored <span className="font-bold text-blue-600">{score}</span> out of {quizData.length}</p>
                        <button 
                            onClick={resetQuiz}
                            className="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition"
                        >
                            Try Again
                        </button>
                    </div>
                );
            }

            const q = quizData[currentQuestion];
            const progress = ((currentQuestion) / quizData.length) * 100;

            return (
                <div className="bg-white rounded-xl shadow-lg overflow-hidden flex flex-col w-full h-[600px]">
                    <div className="bg-slate-800 text-white p-4 flex justify-between items-center">
                        <div className="font-semibold text-lg flex-1">Score: {score} / {quizData.length}</div>
                        <div className="flex-1 max-w-md bg-slate-600 rounded-full h-3 mx-4">
                            <div className="bg-blue-400 h-3 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div className="font-semibold text-lg flex-1 text-right">Question {currentQuestion + 1} of {quizData.length}</div>
                    </div>

                    <div className="flex-1 flex flex-col md:flex-row">
                        <div className="md:w-1/2 p-8 border-b md:border-b-0 md:border-r border-slate-200 flex flex-col justify-center bg-slate-50">
                            <div className="mb-6">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Definition</span>
                                <p className="text-xl font-medium text-slate-800 mt-1 italic">"{q.definition}"</p>
                            </div>
                            
                            <div className="mb-8">
                                <span className="text-sm font-bold uppercase tracking-wider text-slate-500">Sentence</span>
                                <p className="text-2xl font-bold text-blue-900 mt-2 leading-snug">{q.sentence}</p>
                            </div>

                            <div>
                                {!showHint ? (
                                    <button 
                                        onClick={() => setShowHint(true)}
                                        className="text-sm bg-amber-100 text-amber-800 px-4 py-2 rounded-full font-semibold hover:bg-amber-200 transition"
                                    >
                                        💡 Need a Hint?
                                    </button>
                                ) : (
                                    <div className="inline-block bg-amber-200 text-amber-900 px-4 py-2 rounded-full font-bold animate-pulse">
                                        Prefix Hint: {q.hint}
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="md:w-1/2 p-8 flex flex-col justify-center gap-4 bg-white">
                            <h3 className="text-lg font-semibold text-slate-700 mb-2 text-center">Select the correct word:</h3>
                            {q.options.map((option, index) => {
                                let btnClass = "w-full text-left text-lg p-5 rounded-lg border-2 font-medium transition duration-200 shadow-sm ";
                                
                                if (feedback && option === q.word) {
                                    btnClass += "bg-green-100 border-green-500 text-green-800";
                                } else if (feedback === 'incorrect' && option !== q.word) {
                                    btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-50";
                                } else {
                                    btnClass += "bg-white border-slate-300 text-slate-700 hover:border-blue-500 hover:bg-blue-50";
                                }

                                return (
                                    <button 
                                        key={index}
                                        disabled={feedback !== null}
                                        onClick={() => handleAnswer(option)}
                                        className={btnClass}
                                    >
                                        {option}
                                    </button>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Quiz />, document.getElementById('root'));
    </script>
</body>
</html>
