<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEK 18: PREFIX PROTOCOL (CLOZE)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0b0f19;
            background-image: linear-gradient(rgba(255, 183, 3, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 183, 3, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #c9d1d9;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #lab-container {
            background: rgba(11, 15, 25, 0.95);
            border: 2px solid #212d40;
            border-top: 8px solid #ffb703;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        .hub-link {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .hub-link:hover { color: #ffb703; }

        .lab-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            text-align: center;
            margin: 20px 0 5px 0;
            color: #ffb703;
            letter-spacing: 2px;
        }
        
        .sub-title {
            text-align: center;
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Live Word Bank */
        #word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background: #111827;
            border: 1px solid #374151;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .bank-word {
            background: #1f2937;
            color: #ffb703;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 0.9rem;
            border: 1px solid #374151;
            transition: 0.3s;
        }

        .bank-word.used {
            text-decoration: line-through;
            color: #4b5563;
            border-color: #1f2937;
            background: transparent;
        }

        .question-box {
            background: transparent;
            padding: 20px;
            margin-bottom: 25px;
            color: #e5e7eb;
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: center;
        }

        .highlight-blank {
            display: inline-block;
            width: 150px;
            border-bottom: 2px dashed #ffb703;
            margin: 0 10px;
            color: #ffb703;
        }

        /* Terminal Input Area */
        #input-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        #cloze-input {
            background: #0b0f19;
            border: 1px solid #ffb703;
            color: #ffb703;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            border-radius: 4px;
            width: 50%;
            text-align: center;
            text-transform: uppercase;
        }

        #cloze-input:focus { outline: none; box-shadow: 0 0 10px rgba(255, 183, 3, 0.3); }

        #submit-btn {
            background: #ffb703;
            color: #0b0f19;
            border: none;
            padding: 0 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        #submit-btn:hover { filter: brightness(1.2); }

        /* Feedback Modal */
        #feedback-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .next-btn {
            background: #ffb703;
            color: #0b0f19;
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 25px;
            border-radius: 4px;
            font-weight: bold;
        }

        #progress-bar { width: 100%; height: 6px; background: #1f2937; margin-bottom: 20px; border-radius: 3px; }
        #progress-fill { height: 100%; background: #ffb703; width: 0%; transition: width 0.3s; }

    </style>
</head>
<body>

<div id="lab-container">
    <a href="index.html" class="hub-link">← Return to Hub</a>
    <h1 class="lab-title">PREFIX PROTOCOL</h1>
    <p class="sub-title">CLOZE DECRYPTION: PRE | TRANS | SUB | UNI</p>
    
    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="word-bank">
        </div>

    <div id="quiz-content">
        <div id="text-display" class="question-box">INITIALIZING...</div>
        <div id="input-area">
            <input type="text" id="cloze-input" placeholder="ENTER OVERRIDE CODE..." autocomplete="off">
            <button id="submit-btn" onclick="checkAnswer()">SUBMIT</button>
        </div>
    </div>
</div>

<div id="feedback-modal">
    <h1 id="fb-status" style="font-family:'Orbitron'; font-size: 3rem;"></h1>
    <p id="fb-info" style="font-size: 1.2rem; max-width: 600px; color: #d1d5db; padding: 20px; line-height: 1.6;"></p>
    <button class="next-btn" onclick="nextQuestion()">CONTINUE</button>
</div>

<script>
    const allWords = [
        "Precaution", "Predecessor", "Precursor", "Predicament", 
        "Unilateral", "Unite", "Reunion", "Unique", 
        "Subterranean", "Subordinate", "Subsidiary", "Subdermal", 
        "Transmit", "Transparent", "Transcontinental"
    ];

    const rawQuestions = [
        {
            word: "Precaution",
            sentence: "Before handling the dangerous chemicals, the scientist took a <span class='highlight-blank'></span> and put on safety goggles.",
            explanation: "'Pre' means before. You take a PRECAUTION to prevent harm before it happens."
        },
        {
            word: "Predecessor",
            sentence: "The new principal had big shoes to fill, as her <span class='highlight-blank'></span> was loved by all the students and teachers.",
            explanation: "'Pre' means before. A PREDECESSOR is the person who held the job before you."
        },
        {
            word: "Precursor",
            sentence: "Dark, gathering clouds are often a <span class='highlight-blank'></span> to a violent thunderstorm.",
            explanation: "'Pre' means before. A PRECURSOR is an event that comes before and leads to another event."
        },
        {
            word: "Predicament",
            sentence: "When his boat sprang a leak in the middle of the lake, he found himself in a terrible <span class='highlight-blank'></span>.",
            explanation: "A PREDICAMENT is a difficult, sticky situation to get out of."
        },
        {
            word: "Unilateral",
            sentence: "Without consulting the rest of the team, the captain made a <span class='highlight-blank'></span> decision to forfeit the game.",
            explanation: "'Uni' means one. A UNILATERAL decision is entirely one-sided."
        },
        {
            word: "Unite",
            sentence: "In times of crisis, communities often <span class='highlight-blank'></span> to help those in need.",
            explanation: "'Uni' means one. To UNITE is to join together as one in a common belief or action."
        },
        {
            word: "Reunion",
            sentence: "After ten years apart, the extended family gathered at the park for a joyful summer <span class='highlight-blank'></span>.",
            explanation: "'Re' means again, and 'Uni' means one. A REUNION is coming back together as one."
        },
        {
            word: "Unique",
            sentence: "The antique vase was completely <span class='highlight-blank'></span>; there was not another one like it in the entire world.",
            explanation: "'Uni' means one. Something UNIQUE is one of a kind and rarely distinct."
        },
        {
            word: "Subterranean",
            sentence: "The explorers mapped a massive <span class='highlight-blank'></span> cave system hidden deep below the surface of the earth.",
            explanation: "'Sub' means under. SUBTERRANEAN means under the Earth (terra)."
        },
        {
            word: "Subordinate",
            sentence: "The general gave clear instructions to his <span class='highlight-blank'></span> officers to follow the new rules immediately.",
            explanation: "'Sub' means under. A SUBORDINATE is someone in a lower rank or position."
        },
        {
            word: "Subsidiary",
            sentence: "The massive tech company bought a smaller <span class='highlight-blank'></span> company to handle all of its shipping needs.",
            explanation: "'Sub' means under. A SUBSIDIARY is a secondary role of lesser importance, but helpful to the major role."
        },
        {
            word: "Subdermal",
            sentence: "The veterinarian inserted a tiny <span class='highlight-blank'></span> microchip beneath the puppy's skin so it could be tracked if lost.",
            explanation: "'Sub' means under. SUBDERMAL means under the skin (dermis)."
        },
        {
            word: "Transmit",
            sentence: "The radio tower was built to <span class='highlight-blank'></span> emergency signals across the entire mountain valley.",
            explanation: "'Trans' means across. To TRANSMIT is to send something across a distance."
        },
        {
            word: "Transparent",
            sentence: "The water in the tropical lagoon was so <span class='highlight-blank'></span> that we could clearly see the fish swimming at the bottom.",
            explanation: "'Trans' means across/through. TRANSPARENT means you can see right through it."
        },
        {
            word: "Transcontinental",
            sentence: "The completion of the <span class='highlight-blank'></span> railroad allowed people to travel across the entire country in just a few days.",
            explanation: "'Trans' means across. TRANSCONTINENTAL means to go across a land mass (continent)."
        }
    ];

    // Scramble the questions for every user!
    let questions = [...rawQuestions].sort(() => Math.random() - 0.5);

    let current = 0;
    let score = 0;

    // Build the Word Bank
    const bankContainer = document.getElementById("word-bank");
    // Sort words alphabetically for easier searching
    const sortedWords = [...allWords].sort();
    sortedWords.forEach(w => {
        const span = document.createElement("span");
        span.className = "bank-word";
        span.id = "bank-" + w.toLowerCase();
        span.innerText = w;
        bankContainer.appendChild(span);
    });

    function updateProgress() {
        const fill = document.getElementById("progress-fill");
        const percentage = (current / questions.length) * 100;
        fill.style.width = percentage + "%";
    }

    function loadQuestion() {
        updateProgress();
        const q = questions[current];
        document.getElementById("text-display").innerHTML = `<b>FILE ${current + 1}/${questions.length}:</b><br><br>${q.sentence}`;
        const input = document.getElementById("cloze-input");
        input.value = "";
        input.focus();
    }

    function checkAnswer() {
        const inputVal = document.getElementById("cloze-input").value.trim().toLowerCase();
        const correctAns = questions[current].word.toLowerCase();
        
        const modal = document.getElementById("feedback-modal");
        const status = document.getElementById("fb-status");

        if (inputVal === correctAns) {
            score++;
            status.innerText = "ACCESS GRANTED";
            status.style.color = "#3fb950"; 
            
            // Cross off word in bank
            const bankWord = document.getElementById("bank-" + correctAns);
            if(bankWord) bankWord.classList.add("used");
            
            document.getElementById("fb-info").innerText = "Correct! " + questions[current].explanation;
        } else {
            status.innerText = "ACCESS DENIED";
            status.style.color = "#f85149"; 
            document.getElementById("fb-info").innerHTML = `Target sequence was: <b style="color:#ffb703;">${questions[current].word}</b>.<br><br>${questions[current].explanation}`;
        }
        
        modal.style.display = "flex";
    }

    function nextQuestion() {
        document.getElementById("feedback-modal").style.display = "none";
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById("progress-fill").style.width = "100%";
        document.getElementById("input-area").style.display = "none";
        document.getElementById("quiz-content").innerHTML = `
            <div style="text-align:center; padding: 30px 0;">
                <h2 style="font-family:'Orbitron'; font-size: 2.5rem; color: #ffb703;">PROTOCOL COMPLETE</h2>
                <p style="font-size:3.5rem; margin:10px 0; font-family:'Share Tech Mono';">${Math.round((score/questions.length)*100)}%</p>
                <p style="font-size: 1.2rem; color: #8b949e;">Decryption sequence finished.</p>
                <a href="index.html" class="next-btn" style="text-decoration:none; display:inline-block;">RETURN TO DASHBOARD</a>
            </div>`;
    }

    // Allow pressing "Enter" to submit
    document.getElementById("cloze-input").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            checkAnswer();
        }
    });

    loadQuestion();
</script>
</body>
</html>
