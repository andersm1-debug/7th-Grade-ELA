<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEK 18: PREFIX PROTOCOL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0b0f19;
            background-image: linear-gradient(rgba(255, 183, 3, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 183, 3, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #c9d1d9;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        #lab-container {
            background: rgba(11, 15, 25, 0.95);
            border: 2px solid #212d40;
            border-top: 8px solid #ffb703; /* Gold Theme */
            padding: 40px;
            width: 95%;
            max-width: 800px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
        }

        .hub-link {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #8b949e;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .hub-link:hover { color: #ffb703; }

        .lab-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-align: center;
            margin: 20px 0 5px 0;
            color: #ffb703;
            letter-spacing: 2px;
        }
        
        .sub-title {
            text-align: center;
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .question-box {
            background: #111827;
            border: 1px dashed #374151;
            padding: 25px;
            margin-bottom: 25px;
            color: #e5e7eb;
            font-size: 1.3rem;
            line-height: 1.6;
            text-align: center;
        }

        .highlight { color: #ffb703; font-weight: bold; }

        .choice-btn {
            background: #1f2937;
            border: 1px solid #374151;
            color: #d1d5db;
            padding: 18px;
            margin: 10px 0;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .choice-btn:hover {
            background: #ffb703;
            color: #0b0f19;
            border-color: #ffb703;
            transform: translateX(5px);
        }

        #feedback-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .next-btn {
            background: #ffb703;
            color: #0b0f19;
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 25px;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .next-btn:hover { filter: brightness(1.2); }

        #progress-bar {
            width: 100%;
            height: 6px;
            background: #1f2937;
            margin-bottom: 20px;
            border-radius: 3px;
        }
        
        #progress-fill {
            height: 100%;
            background: #ffb703;
            width: 0%;
            transition: width 0.3s;
        }

    </style>
</head>
<body>

<div id="lab-container">
    <a href="index.html" class="hub-link">← Return to Hub</a>
    <h1 class="lab-title">PREFIX PROTOCOL</h1>
    <p class="sub-title">WEEK 18: PRE | TRANS | SUB | UNI</p>
    
    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="quiz-content">
        <div id="text-display" class="question-box">INITIALIZING...</div>
        <div id="options"></div>
    </div>
</div>

<div id="feedback-modal">
    <h1 id="fb-status" style="font-family:'Orbitron'; font-size: 3rem;"></h1>
    <p id="fb-info" style="font-size: 1.2rem; max-width: 600px; color: #d1d5db; padding: 20px; line-height: 1.6;"></p>
    <button class="next-btn" onclick="nextQuestion()">CONTINUE</button>
</div>

<script>
    // Answer choices are fully scrambled (A, B, and C) to prevent pattern guessing.
    const questions = [
        {
            text: "The prefix <span class='highlight'>SUB-</span> means 'under'. If scientists discover a <span class='highlight'>subterranean</span> cave system, where is it located?",
            choices: [
                { text: "Under the Earth.", correct: true },
                { text: "High in the mountains.", correct: false },
                { text: "Across a large body of water.", correct: false }
            ],
            explanation: "Correct! 'Sub' (under) + 'terra' (earth) = Under the Earth."
        },
        {
            text: "The prefix <span class='highlight'>PRE-</span> means 'before'. What are you doing if you take a <span class='highlight'>precaution</span> in the science lab?",
            choices: [
                { text: "Fixing a mistake after it happens.", correct: false },
                { text: "Taking a measure beforehand to prevent harm.", correct: true },
                { text: "Acting together in a common belief.", correct: false }
            ],
            explanation: "Correct! You are being cautious BEFORE something bad can happen."
        },
        {
            text: "The prefix <span class='highlight'>UNI-</span> means 'one'. If a government makes a <span class='highlight'>unilateral</span> decision, what kind of decision is it?",
            choices: [
                { text: "A decision that requires two teams to agree.", correct: false },
                { text: "A decision that is rarely distinct.", correct: false },
                { text: "An entirely one-sided decision.", correct: true }
            ],
            explanation: "Correct! 'Uni' (one) + 'lateral' (side) = entirely one-sided."
        },
        {
            text: "The prefix <span class='highlight'>TRANS-</span> means 'across'. Which of the following defines a <span class='highlight'>transcontinental</span> railroad?",
            choices: [
                { text: "A train that goes under the skin.", correct: false },
                { text: "A train that goes across a land mass.", correct: true },
                { text: "A train that comes before another train.", correct: false }
            ],
            explanation: "Correct! It transmits passengers ACROSS a continent (land mass)."
        },
        {
            text: "If your <span class='highlight'>predecessor</span> left you a note at your new job, who wrote the note?",
            choices: [
                { text: "Someone who comes before you in a job or family.", correct: true },
                { text: "Someone in a position lower in rank than you.", correct: false },
                { text: "An event that leads to a second event.", correct: false }
            ],
            explanation: "Correct! 'Pre' means before. They held the job BEFORE you did."
        },
        {
            text: "What is the best definition of a <span class='highlight'>subsidiary</span> role?",
            choices: [
                { text: "The primary, most important role in a company.", correct: false },
                { text: "To send across distances.", correct: false },
                { text: "A secondary role of lesser importance, but still helpful.", correct: true }
            ],
            explanation: "Correct! Because it starts with 'Sub' (under), it sits underneath the major role in importance."
        },
        {
            text: "If students decide to <span class='highlight'>unite</span>, what are they doing?",
            choices: [
                { text: "Acting together in a common belief or idea.", correct: true },
                { text: "Seeing through a transparent window.", correct: false },
                { text: "Coming back together once more.", correct: false }
            ],
            explanation: "Correct! They are joining together to become ONE ('Uni')."
        },
        {
            text: "Glass is described as <span class='highlight'>transparent</span> because it allows you to do what?",
            choices: [
                { text: "Keep light trapped inside.", correct: false },
                { text: "See through it.", correct: true },
                { text: "Get out of a difficult predicament.", correct: false }
            ],
            explanation: "Correct! 'Trans' means across. Light can pass across or through the glass."
        },
        {
            text: "Dark clouds are often a <span class='highlight'>precursor</span> to a heavy storm. What does precursor mean?",
            choices: [
                { text: "An entirely one-sided event.", correct: false },
                { text: "An event that leads to and is responsible for a second event.", correct: true },
                { text: "A measure taken to prevent harm.", correct: false }
            ],
            explanation: "Correct! The clouds come BEFORE ('Pre') the storm and lead to the rain."
        },
        {
            text: "Where would a doctor place a <span class='highlight'>subdermal</span> tracker on a wild animal?",
            choices: [
                { text: "Under the skin.", correct: true },
                { text: "Under the Earth.", correct: false },
                { text: "Across its back.", correct: false }
            ],
            explanation: "Correct! 'Sub' (under) + 'dermal' (skin)."
        },
        {
            text: "What happens at a family <span class='highlight'>reunion</span>?",
            choices: [
                { text: "They get into a difficult situation.", correct: false },
                { text: "They come back together once more.", correct: true },
                { text: "They act together to become rarely distinct.", correct: false }
            ],
            explanation: "Correct! They unite (become one) again."
        },
        {
            text: "How would you describe a <span class='highlight'>subordinate</span> worker in an office?",
            choices: [
                { text: "They hold a position lower in rank.", correct: true },
                { text: "They are entirely one-sided.", correct: false },
                { text: "They are the person who had the job before you.", correct: false }
            ],
            explanation: "Correct! 'Sub' means under. They work under the manager."
        },
        {
            text: "A cell tower's job is to <span class='highlight'>transmit</span> data. What does this mean?",
            choices: [
                { text: "To take a measure beforehand.", correct: false },
                { text: "To see through.", correct: false },
                { text: "To send across.", correct: true }
            ],
            explanation: "Correct! 'Trans' means across. It sends signals across the city."
        },
        {
            text: "If a piece of art is truly <span class='highlight'>unique</span>, it is...",
            choices: [
                { text: "Secondary and of lesser importance.", correct: false },
                { text: "Rarely distinct (one of a kind).", correct: true },
                { text: "A difficult situation to get out of.", correct: false }
            ],
            explanation: "Correct! 'Uni' means one. There is only one of it."
        },
        {
            text: "If you lose your keys and lock yourself out of your car, you are in a <span class='highlight'>predicament</span>. What is that?",
            choices: [
                { text: "An event that leads to a second event.", correct: false },
                { text: "A position lower in rank.", correct: false },
                { text: "A difficult situation to get out of.", correct: true }
            ],
            explanation: "Correct! You are stuck in a tough spot."
        }
    ];

    let current = 0;
    let score = 0;

    function updateProgress() {
        const fill = document.getElementById("progress-fill");
        const percentage = (current / questions.length) * 100;
        fill.style.width = percentage + "%";
    }

    function loadQuestion() {
        updateProgress();
        const q = questions[current];
        document.getElementById("text-display").innerHTML = `<b>WORD ${current + 1} of ${questions.length}:</b><br><br>${q.text}`;
        const optCont = document.getElementById("options");
        optCont.innerHTML = "";

        q.choices.forEach(c => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerHTML = c.text;
            btn.onclick = () => {
                const modal = document.getElementById("feedback-modal");
                const status = document.getElementById("fb-status");
                if (c.correct) {
                    score++;
                    status.innerText = "ACCESS GRANTED";
                    status.style.color = "#3fb950"; // Green for correct
                } else {
                    status.innerText = "ACCESS DENIED";
                    status.style.color = "#f85149"; // Red for incorrect
                }
                document.getElementById("fb-info").innerText = q.explanation;
                modal.style.display = "flex";
            };
            optCont.appendChild(btn);
        });
    }

    function nextQuestion() {
        document.getElementById("feedback-modal").style.display = "none";
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById("progress-fill").style.width = "100%";
        document.getElementById("quiz-content").innerHTML = `
            <div style="text-align:center; padding: 30px 0;">
                <h2 style="font-family:'Orbitron'; font-size: 2.5rem; color: #ffb703;">PROTOCOL COMPLETE</h2>
                <p style="font-size:3.5rem; margin:10px 0; font-family:'Share Tech Mono';">${Math.round((score/questions.length)*100)}%</p>
                <p style="font-size: 1.2rem; color: #8b949e;">You have successfully navigated Week 18.</p>
                <a href="index.html" class="next-btn" style="text-decoration:none; display:inline-block;">RETURN TO DASHBOARD</a>
            </div>`;
    }

    // Initialize the first question
    loadQuestion();
</script>
</body>
</html>
